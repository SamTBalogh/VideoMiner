services:
  videominer:
    environment:
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: videominer-frontend
    depends_on:
      videominer:
        condition: service_started
      vimeominer:
        condition: service_started
      youtubeminer:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
