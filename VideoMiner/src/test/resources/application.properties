spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.event.merge.entity_copy_observer=allow
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
videominer.auth.token.pepper=test-pepper-for-tests-only
videominer.auth.token.management-key=test-management-key
videominer.auth.token.default-ttl-hours=24
videominer.auth.token.min-ttl-hours=1
videominer.auth.token.max-ttl-hours=720
