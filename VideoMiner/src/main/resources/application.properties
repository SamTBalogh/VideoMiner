server.port=${SERVER_PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/videominer}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:videominer}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:videominer}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.event.merge.entity_copy_observer=allow
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
videominer.auth.token.pepper=${VIDEOMINER_TOKEN_PEPPER}
videominer.auth.token.management-key=${VIDEOMINER_TOKEN_MANAGEMENT_KEY}
videominer.auth.token.default-ttl-hours=${VIDEOMINER_TOKEN_DEFAULT_TTL_HOURS:24}
videominer.auth.token.min-ttl-hours=${VIDEOMINER_TOKEN_MIN_TTL_HOURS:1}
videominer.auth.token.max-ttl-hours=${VIDEOMINER_TOKEN_MAX_TTL_HOURS:720}

#To display errors
server.error.include-message=always

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
