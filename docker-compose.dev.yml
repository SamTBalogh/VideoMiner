services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  videominer:
    build:
      target: build
    working_dir: /workspace
    command: ["bash", "/workspace/scripts/dev-java-runner.sh", "VideoMiner"]
    volumes:
      - ./:/workspace
      - maven_cache:/root/.m2
    environment:
      DEV_WATCH_INTERVAL_SECONDS: ${DEV_WATCH_INTERVAL_SECONDS:-2}
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: 2s
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: 1s
    ports:
      - "${VIDEOMINER_PORT:-8080}:8080"

  vimeominer:
    build:
      target: build
    working_dir: /workspace
    command: ["bash", "/workspace/scripts/dev-java-runner.sh", "VimeoMiner"]
    volumes:
      - ./:/workspace
      - maven_cache:/root/.m2
    environment:
      DEV_WATCH_INTERVAL_SECONDS: ${DEV_WATCH_INTERVAL_SECONDS:-2}
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: 2s
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: 1s
    ports:
      - "${VIMEOMINER_PORT:-8081}:8081"

  youtubeminer:
    build:
      target: build
    working_dir: /workspace
    command: ["bash", "/workspace/scripts/dev-java-runner.sh", "YoutubeMiner"]
    volumes:
      - ./:/workspace
      - maven_cache:/root/.m2
    environment:
      DEV_WATCH_INTERVAL_SECONDS: ${DEV_WATCH_INTERVAL_SECONDS:-2}
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: 2s
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: 1s
    ports:
      - "${YOUTUBEMINER_PORT:-8082}:8082"

  frontend:
    image: node:22.12-alpine
    container_name: videominer-frontend-dev
    working_dir: /workspace/frontend
    command: ["sh", "/workspace/frontend/scripts/dev-entrypoint.sh"]
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: ${FRONTEND_CHOKIDAR_INTERVAL:-300}
      VITE_VIDEOMINER_TARGET: http://videominer:8080
      VITE_VIMEOMINER_TARGET: http://vimeominer:8081
      VITE_YOUTUBEMINER_TARGET: http://youtubeminer:8082
    depends_on:
      videominer:
        condition: service_started
      vimeominer:
        condition: service_started
      youtubeminer:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  maven_cache:
  frontend_node_modules:
