services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  videominer:
    environment:
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "${VIDEOMINER_PORT:-8080}:8080"

  vimeominer:
    ports:
      - "${VIMEOMINER_PORT:-8081}:8081"

  youtubeminer:
    ports:
      - "${YOUTUBEMINER_PORT:-8082}:8082"
