name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-videominer:
    name: VideoMiner tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run VideoMiner tests
        run: mvn test -pl VideoMiner --batch-mode

  test-vimeominer:
    name: VimeoMiner tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run VimeoMiner tests
        run: mvn test -pl VimeoMiner --batch-mode

  test-youtubeiminer:
    name: YoutubeMiner tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run YoutubeMiner tests
        run: mvn test -pl YoutubeMiner --batch-mode
